<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="ballGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0c1d4d"/>
    </radialGradient>
    <radialGradient id="highlight" cx="30%" cy="25%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle (shadow) -->
  <circle cx="32" cy="34" r="28" fill="url(#shadow)"/>
  <!-- Main ball -->
  <circle cx="32" cy="30" r="28" fill="url(#ballGrad)"/>
  <!-- Highlight (top-left shine) -->
  <circle cx="32" cy="30" r="28" fill="url(#highlight)"/>
  <!-- Inner ring detail -->
  <circle cx="32" cy="30" r="28" fill="none" stroke="#1e3a8a" stroke-width="0.5" opacity="0.4"/>
  <!-- Small specular highlight -->
  <ellipse cx="22" cy="20" rx="8" ry="5" fill="#ffffff" opacity="0.6" transform="rotate(-30 22 20)"/>
</svg>
