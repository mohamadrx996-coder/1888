<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 30 30" style="enable-background:new 0 0 30 30;" xml:space="preserve">
  <defs>
    <!-- تدرج لوني شعاعي لإعطاء تأثير الكرة المجسمة ثلاثية الأبعاد -->
    <radialGradient id="blueSphereGrad" cx="35%" cy="35%" r="65%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#A5D8FF" />
      <stop offset="40%" stop-color="#228BE6" />
      <stop offset="100%" stop-color="#0B3B60" />
    </radialGradient>
    
    <style type="text/css">
      .z-breathe { 
        animation: breathe 2.5s ease-in-out infinite; 
        transform-origin: center;
      }
      @keyframes breathe { 
        0%, 100% { opacity: 0.85; transform: scale(0.98); } 
        50% { opacity: 1; transform: scale(1.02); } 
      }
    </style>
  </defs>
  
  <g class="z-breathe">
    <!-- الكرة الزرقاء ثلاثية الأبعاد -->
    <circle cx="15" cy="15" r="13" fill="url(#blueSphereGrad)" />
  </g>
</svg>

